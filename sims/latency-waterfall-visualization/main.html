<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Latency Waterfall Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; background: #ffffff; font-family: Arial, Helvetica, sans-serif; }
        main {
            width: 100%;
            max-width: 880px;
            margin: 0 auto;
            padding: 10px 16px 14px 16px;
        }
        h1 { font-size: 17px; text-align: center; color: #1a3a6c; margin-bottom: 10px; }
        .chart-container { position: relative; width: 100%; height: 340px; }
        .legend {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 14px;
            margin-top: 10px; font-size: 12.5px; color: #334155;
        }
        .legend span { display: inline-flex; align-items: center; }
        .legend i { width: 13px; height: 13px; border-radius: 3px; margin-right: 6px; display: inline-block; }
    </style>
</head>
<body>
    <main>
        <h1>Chatbot Response Latency Breakdown: Simple vs. Complex Queries</h1>
        <div class="chart-container">
            <canvas id="latencyChart"></canvas>
        </div>
        <div class="legend">
            <span><i style="background:rgba(54,162,235,0.85)"></i>Intent Classification</span>
            <span><i style="background:rgba(34,197,94,0.85)"></i>Retrieval (template, context, vector)</span>
            <span><i style="background:rgba(249,115,22,0.85)"></i>LLM Generation</span>
            <span><i style="background:rgba(147,51,234,0.85)"></i>Response Formatting</span>
        </div>
    </main>
    <script src="latency-waterfall-visualization.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Word Embedding Vector Space Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body { font-family: Arial, Helvetica, sans-serif; background: #ffffff; }
        main { display: block; padding: 8px; height: 100%; }
        .chart-wrap { width: 100%; height: calc(100% - 24px); }
        .note { font-size: 12px; color: #607d8b; text-align: center; padding-top: 4px; }
    </style>
</head>
<body>
    <main>
        <div class="chart-wrap">
            <canvas id="embeddingChart"></canvas>
        </div>
        <div class="note">Actual embeddings exist in 100-300 dimensional space; this is a 2D projection.</div>
    </main>
    <script src="word-embedding-vector-space-visualization.js"></script>
</body>
</html>

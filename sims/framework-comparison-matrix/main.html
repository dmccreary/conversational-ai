<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Framework Comparison Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; background: #ffffff; font-family: Arial, Helvetica, sans-serif; }
        main {
            width: 100%;
            max-width: 740px;
            margin: 0 auto;
            padding: 10px 16px 16px 16px;
        }
        h1 {
            font-size: 18px;
            text-align: center;
            color: #1a3a6c;
            margin-bottom: 8px;
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }
        .notes {
            max-width: 700px;
            margin: 6px auto 0 auto;
            font-size: 12.5px;
            color: #334155;
        }
        .notes div { margin: 3px 0; padding-left: 14px; position: relative; }
        .notes .swatch {
            position: absolute; left: 0; top: 4px;
            width: 9px; height: 9px; border-radius: 2px;
        }
    </style>
</head>
<body>
    <main>
        <h1>Chatbot Framework Comparison: Key Evaluation Dimensions</h1>
        <div class="chart-container">
            <canvas id="radarChart"></canvas>
        </div>
        <div class="notes">
            <div><span class="swatch" style="background:rgba(54,162,235,1)"></span><strong>Rasa</strong> — best for on-premise, heavily customized deployments.</div>
            <div><span class="swatch" style="background:rgba(34,197,94,1)"></span><strong>Dialogflow</strong> — fastest development, runs on Google Cloud.</div>
            <div><span class="swatch" style="background:rgba(147,51,234,1)"></span><strong>LangChain</strong> — leading LLM orchestration framework.</div>
        </div>
    </main>
    <script src="framework-comparison-matrix.js"></script>
</body>
</html>

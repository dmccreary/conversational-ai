<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Query Distribution: Pareto Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: Arial, Helvetica, sans-serif; background: aliceblue; }
        #wrap { width: 100%; height: 100vh; display: flex; flex-direction: column; padding: 8px 10px; }
        #title { text-align: center; font-size: 19px; font-weight: bold; color: #1a3a6c; margin-bottom: 2px; }
        #subtitle { text-align: center; font-size: 12px; color: #52606d; margin-bottom: 6px; }
        #chartbox { flex: 1; min-height: 0; position: relative; }
        canvas { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; }
        #notes { font-size: 11.5px; color: #486581; text-align: center; margin-top: 6px; line-height: 1.5; }
        #notes b { color: #1a3a6c; }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="title">Query Distribution: Pareto Analysis</div>
        <div id="subtitle">A small number of intent types accounts for most of the traffic</div>
        <main id="chartbox"><canvas id="pareto"></canvas></main>
        <div id="notes">
            <b>Top 6 intents = 84% of queries</b> &middot;
            80% threshold reached at the 5th intent &middot;
            long tail: 12 intents = 16% of queries
        </div>
    </div>
    <script src="pareto-chart-for-query-distribution.js"></script>
</body>
</html>
